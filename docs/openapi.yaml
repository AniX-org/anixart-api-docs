        percentage:
          title: IPreferredType.percentage
          type: integer
      required:
        - name
        - percentage
      additionalProperties: false
      title: IPreferredType
      type: object
    IProfileShort:
      properties:
        id:
          title: IProfileShort.id
          type: integer
        login:
          title: IProfileShort.login
          type: string
        avatar:
          title: IProfileShort.avatar
          type: string
        ban_expires:
          title: IProfileShort.ban_expires
          type: integer
        ban_reason:
          title: IProfileShort.ban_reason
          type: string
        privilege_level:
          title: IProfileShort.privilege_level
          type: integer
        badge_id:
          title: IProfileShort.badge_id
          nullable: true
          type: integer
        badge_name:
          title: IProfileShort.badge_name
          nullable: true
          type: string
        badge_type:
          title: IProfileShort.badge_type
          nullable: true
          type: integer
        badge_url:
          title: IProfileShort.badge_url
          nullable: true
          type: string
        is_banned:
          title: IProfileShort.is_banned
          type: boolean
        is_sponsor:
          title: IProfileShort.is_sponsor
          type: boolean
        is_verified:
          title: IProfileShort.is_verified
          type: boolean
        is_online:
          title: IProfileShort.is_online
          type: boolean
        friend_status:
          title: IProfileShort.friend_status
          type: integer
        friend_count:
          title: IProfileShort.friend_count
          type: integer
      required:
        - id
        - login
        - avatar
        - ban_expires
        - ban_reason
        - privilege_level
        - badge_id
        - badge_name
        - badge_type
        - badge_url
        - is_banned
        - is_sponsor
        - is_verified
        - is_online
        - friend_status
        - friend_count
      additionalProperties: false
      title: IProfileShort
      type: object
    IProfileToken:
      properties:
        id:
          title: IProfileToken.id
          type: string
        token:
          title: IProfileToken.token
          type: string
      required:
        - id
        - token
      additionalProperties: false
      title: IProfileToken
      type: object

    # -- Release
    IRelease:
      properties:
        "@id":
          title: IRelease."@id"
          type: integer
        id:
          title: IRelease.id
          type: integer
        poster:
          title: IRelease.poster
          type: string
        image:
          title: IRelease.image
          type: string
        year:
          title: IRelease.year
          type: string
        genres:
          title: IRelease.genres
          type: string
        country:
          title: IRelease.country

---
"$schema": "https://spec.openapis.org/oas/3.1/dialect/base"
openapi: 3.1.0

info:
  title: Anixart API
  description:
    This is an unofficial OpenAPI definition for the Anixart API, based
    on Anixart beta 9
  version: 9.0 beta 9

externalDocs: {}

servers:
  - url: https://api-s.anixsekai.com

tags:
  - name: Auth
    description: User authentication
  - name: Discover
    description: Discover content

paths:
  "/auth/signIn":
    post:
      tags:
        - Auth
      summary: Sign in
      description: Sign in to account and get a token
      operationId: authSignIn
      parameters:
        - name: login
          in: query
          description: account login or email
          required: true
          schema:
            type: string
        - name: password
          in: query
          description: account password
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ILoginResponse"
  "/auth/signUp":
    post:
      tags:
        - Auth
      summary: Sign up
      description: Sign up new account and get a verify code
      operationId: authSignUp
      parameters:
        - name: email
          in: query
          description: account email
          required: true
          schema:
            type: string
        - name: login
          in: query
          description: account login
          required: true
          schema:
            type: string
        - name: password
          in: query
          description: account password
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IRegisterResponse"
  "/auth/verify":
    post:
      tags:
        - Auth
      summary: Verify sign up
      description: verify sign up of an account and get a token
      operationId: authVerify
      parameters:
        - name: email
          in: query
          description: account email
          required: true
          schema:
            type: string
        - name: login
          in: query
          description: account login
          required: true
          schema:
            type: string
        - name: password
          in: query
          description: account password
          required: true
          schema:
            type: string
        - name: hash
          in: query
          description: verify hash
          required: true
          schema:
            type: string
        - name: code
          in: query
          description: verify code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IRegisterVerifyResponse"
  "/auth/restore":
    post:
      tags:
        - Auth
      summary: Restore a password
      description: Send a verify code to restore a password
      operationId: authRestore
      parameters:
        - name: login
          in: query
          description: account login
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IRestoreResponse"
  "/auth/restore/verify":
    post:
      tags:
        - Auth
      summary: verify a password reset
      description: verify a password reset for account and get a token
      operationId: authRestoreVerify
      parameters:
        - name: login
          in: query
          description: account login
          required: true
          schema:
            type: string
        - name: password
          in: query
          description: account password
          required: true
          schema:
            type: string
        - name: hash
          in: query
          description: verify hash
          required: true
          schema:
            type: string
        - name: code
          in: query
          description: verify code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IRestoreVerifyResponse"

  "/discover/watching/{page}":
    get:
      tags:
        - Discover
      summary: Watching now
      description: Get currently watching releases by users
      operationId: discoverWatching
      parameters:
        - name: page
          in: path
          description: page
          required: true
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IReleasesPagedResponse"
      security:
        - token: []
  "/discover/discussing":
    get:
      tags:
        - Discover
      summary: Most discussing releases
      description: Get 5 currently most discussing releases by users
      operationId: discoverDiscussing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IReleasesPagedResponse"
      security:
        - token: []
  "/discover/recommendations/{page}":
    get:
      tags:
        - Discover
      summary: Get recommendations list
      description: Get recommendations list. Authentication is required
      operationId: discoverRecommendations
      parameters:
        - name: page
          in: path
          description: page
          required: true
          schema:
            type: integer
            example: 0
        - name: previous_page
          in: query
          description: Current page - 1, should always be set
          required: true
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IReleasesPagedResponse"
      security:
        - token: []
  "/discover/interesting":
    get:
      tags:
        - Discover
      summary: Interesting releases
      description: Get currently Interesting releases by users
      operationId: discoverInteresting
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IDiscoverInterestingResponse"
      security:
        - token: []
  "/discover/comments":
    get:
      tags:
        - Discover
      summary: Get popular comments
      description: Get 10 popular comments
      operationId: discoverComments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ICommentReleasePagedResponse"
      security:
        - token: []

components:
  schemas:
    ILoginResponse:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/LoginResult"
        profile:
          "$ref": "#/components/schemas/IProfile"
        profileToken:
          "$ref": "#/components/schemas/IProfileToken"
    IRegisterResponse:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/RegisterResult"
        hash:
          type: string
          example: "hash"
        codeTimestampExpires:
          type: integer
    IRegisterVerifyResponse:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/RegisterVerifyResult"
        profile:
          "$ref": "#/components/schemas/IProfile"
        profileToken:
          "$ref": "#/components/schemas/IProfileToken"
    IRestoreResponse:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/RestoreResult"
        hash:
          type: string
          example: "hash"
        codeTimestampExpires:
          type: integer
    IRestoreVerifyResponse:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/RestoreVerifyResult"
        profile:
          "$ref": "#/components/schemas/IProfile"
        profileToken:
          "$ref": "#/components/schemas/IProfileToken"
    IReleasesPagedResponse:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/DefaultResult"
        content:
          type: array
          items:
            "$ref": "#/components/schemas/IRelease"
        total_count:
          type: integer
          example: 0
        total_page_count:
          type: integer
          example: 0
        current_page:
          type: integer
          example: 0
    IDiscoverInterestingResponse:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/DefaultResult"
        content:
          type: array
          items:
            "$ref": "#/components/schemas/IInterestingRelease"
        total_count:
          type: integer
          example: 0
        total_page_count:
          type: integer
          example: 0
        current_page:
          type: integer
          example: 0
    ICommentReleasePagedResponse:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/DefaultResult"
        content:
          type: array
          items:
            "$ref": "#/components/schemas/ICommentRelease"
        total_count:
          type: integer
          example: 0
        total_page_count:
          type: integer
          example: 0
        current_page:
          type: integer
          example: 0

  # -- Api Status Codes
    DefaultResult:
      type: integer
      format: integer
      example: 0
      oneOf:
        - const: 0
          title: Success
          description: Everything is OK!
        - const: 1
          title: UnexpectedError
          description: Something went wrong
        - const: 401
          title: Unauthorized
          description: Not logged in
        - const: 402
          title: Ban
          description: Temporary banned
        - const: 403
          title: PermBan
          description: Permanently banned
    LoginResult:
      type: integer
      format: integer
      example: 0
      oneOf:
        - "$ref": "#/components/schemas/DefaultResult"
          title: Default schemas
        - const: 2
          title: InvalidLogin
        - const: 3
          title: InvalidPassword
    RegisterResult:
        type: integer
        format: integer
        example: 0
        oneOf:
          - "$ref": "#/components/schemas/DefaultResult"
          - const: 2
            title: InvalidLogin
          - const: 3
            title: InvalidEmail
          - const: 4
            title: InvalidPassword
          - const: 5
            title: LoginAlreadyTaken
          - const: 6
            title: EmailAlreadyTaken
          - const: 7
            title: CodeAlreadySend
          - const: 8
            title: CodeCannotSend
          - const: 9
            title: EmailServiceDisallowed
          - const: 10
            title: TooManyRegistrations
    RegisterVerifyResult:
        type: integer
        format: integer
        example: 0
        oneOf:
          - "$ref": "#/components/schemas/DefaultResult"
          - const: 2
            title: InvalidLogin
          - const: 3
            title: InvalidEmail
          - const: 4
            title: InvalidPassword
          - const: 5
            title: LoginAlreadyTaken
          - const: 6
            title: EmailAlreadyTaken
          - const: 7
            title: CodeAlreadySend
          - const: 8
            title: CodeCannotSend
          - const: 9
            title: InvalidHash
          - const: 10
            title: EmailServiceDisallowed
          - const: 11
            title: TooManyRegistrations
    RestoreResult:
      type: integer
      format: integer
      example: 0
      oneOf:
        - "$ref": "#/components/schemas/DefaultResult"
        - const: 2
          title: ProfileNotFound
        - const: 3
          title: CodeAlreadySend
        - const: 4
          title: CodeCannotSend
    RestoreVerifyResult:
      type: integer
      format: integer
      example: 0
      oneOf:
        - "$ref": "#/components/schemas/DefaultResult"
        - const: 2
          title: ProfileNotFound
        - const: 3
          title: InvalidPassword
        - const: 4
          title: CodeInvalid
        - const: 5
          title: CodeExpired
        - const: 6
          title: InvalidHash

  # -- Types
    # -- Profile
    IProfile:
      properties:
        id:
          title: IProfile.id
          type: integer
        login:
          title: IProfile.login
          type: string
        avatar:
          title: IProfile.avatar
          type: string
        status:
          title: IProfile.status
          type: string
        sponsorshipExpires:
          title: IProfile.sponsorshipExpires
          type: integer
        history:
          items:
            "$ref": "#/components/schemas/IRelease"
          title: IProfile.history
          nullable: true
          type: array
        votes:
          items:
            "$ref": "#/components/schemas/IVoteRelease"
          title: IProfile.votes
          nullable: true
          type: array
        last_activity_time:
          title: IProfile.last_activity_time
          type: integer
        register_date:
          title: IProfile.register_date
          type: integer
        vk_page:
          title: IProfile.vk_page
          type: string
        tg_page:
          title: IProfile.tg_page
          type: string
        inst_page:
          title: IProfile.inst_page
          type: string
        tt_page:
          title: IProfile.tt_page
          type: string
        discord_page:
          title: IProfile.discord_page
          type: string
        ban_expires:
          title: IProfile.ban_expires
          type: integer
        ban_reason:
          title: IProfile.ban_reason
          type: string
        ban_note:
          title: IProfile.ban_note
          nullable: true
          type: string
        privilege_level:
          title: IProfile.privilege_level
          type: integer
        watching_count:
          title: IProfile.watching_count
          type: integer
        plan_count:
          title: IProfile.plan_count
          type: integer
        completed_count:
          title: IProfile.completed_count
          type: integer
        hold_on_count:
          title: IProfile.hold_on_count
          type: integer
        dropped_count:
          title: IProfile.dropped_count
          type: integer
        favorite_count:
          title: IProfile.favorite_count
          type: integer
        comment_count:
          title: IProfile.comment_count
          type: integer
        collection_count:
          title: IProfile.collection_count
          type: integer
        video_count:
          title: IProfile.video_count
          type: integer
        friend_count:
          title: IProfile.friend_count
          type: integer
        watched_episode_count:
          title: IProfile.watched_episode_count
          type: integer
        watched_time:
          title: IProfile.watched_time
          type: integer
        is_private:
          title: IProfile.is_private
          type: boolean
        is_sponsor:
          title: IProfile.is_sponsor
          type: boolean
        is_banned:
          title: IProfile.is_banned
          type: boolean
        is_perm_banned:
          title: IProfile.is_perm_banned
          type: boolean
        is_bookmarks_transferred:
          title: IProfile.is_bookmarks_transferred
          type: boolean
        is_sponsor_transferred:
          title: IProfile.is_sponsor_transferred
          type: boolean
        is_vk_bound:
          title: IProfile.is_vk_bound
          type: boolean
        is_google_bound:
          title: IProfile.is_google_bound
          type: boolean
        is_release_type_notifications_enabled:
          title: IProfile.is_release_type_notifications_enabled
          type: boolean
        is_episode_notifications_enabled:
          title: IProfile.is_episode_notifications_enabled
          type: boolean
        is_first_episode_notification_enabled:
          title: IProfile.is_first_episode_notification_enabled
          type: boolean
        is_related_release_notifications_enabled:
          title: IProfile.is_related_release_notifications_enabled
          type: boolean
        is_report_process_notifications_enabled:
          title: IProfile.is_report_process_notifications_enabled
          type: boolean
        is_comment_notifications_enabled:
          title: IProfile.is_comment_notifications_enabled
          type: boolean
        is_my_collection_comment_notifications_enabled:
          title: IProfile.is_my_collection_comment_notifications_enabled
          type: boolean
        is_verified:
          title: IProfile.is_verified
          type: boolean
        watch_dynamics:
          items:
            $ref: "#/components/schemas/IWatchDynamics"
            title: IProfile.watch_dynamics.[]
          title: IProfile.watch_dynamics
          type: array
        friend_status:
          title: IProfile.friend_status
          type: integer
        rating_score:
          title: IProfile.rating_score
          type: integer
        is_blocked:
          title: IProfile.is_blocked
          type: boolean
        is_me_blocked:
          title: IProfile.is_me_blocked
          type: boolean
        is_stats_hidden:
          title: IProfile.is_stats_hidden
          type: boolean
        is_counts_hidden:
          title: IProfile.is_counts_hidden
          type: boolean
        is_social_hidden:
          title: IProfile.is_social_hidden
          type: boolean
        is_friend_requests_disallowed:
          title: IProfile.is_friend_requests_disallowed
          type: boolean
        is_online:
          title: IProfile.is_online
          type: boolean
        roles:
          items:
            $ref: "#/components/schemas/IRole"
            title: IProfile.roles.[]
          title: IProfile.roles
          type: array
        badge:
          anyOf:
            - $ref: "#/components/schemas/IBadge"
              title: IProfile.badge
            - title: IProfile.badge
              nullable: true
          title: IProfile.badge
        preferred_genres:
          items:
            $ref: "#/components/schemas/IPreferredType"
            title: IProfile.preferred_genres.[]
          title: IProfile.preferred_genres
          type: array
        preferred_audiences:
          items:
            $ref: "#/components/schemas/IPreferredType"
            title: IProfile.preferred_audiences.[]
          title: IProfile.preferred_audiences
          type: array
        preferred_themes:
          items:
            $ref: "#/components/schemas/IPreferredType"
            title: IProfile.preferred_themes.[]
          title: IProfile.preferred_themes
          type: array
        theme_enabled:
          title: IProfile.theme_enabled
          type: boolean
        theme_gradient_start_color:
          title: IProfile.theme_gradient_start_color
          nullable: true
          type: string
        theme_gradient_end_color:
          title: IProfile.theme_gradient_end_color
          nullable: true
          type: string
        theme_gradient_angle:
          title: IProfile.theme_gradient_angle
          nullable: true
          type: string
        theme_icon_res_name:
          title: IProfile.theme_icon_res_name
          nullable: true
          type: string
        theme_icon_url:
          title: IProfile.theme_icon_url
          nullable: true
          type: string
        theme_icon_color:
          title: IProfile.theme_icon_color
          nullable: true
          type: string
        theme_icon_alpha:
          title: IProfile.theme_icon_alpha
          type: integer
        theme_icon_destiny:
          title: IProfile.theme_icon_destiny
          nullable: true
          type: string
        theme_icon_size:
          title: IProfile.theme_icon_size
          nullable: true
          type: string
        theme_animation_enabled:
          title: IProfile.theme_animation_enabled
          type: boolean
        theme_animation_speed:
          title: IProfile.theme_animation_speed
          nullable: true
          type: string
        theme_background_url:
          title: IProfile.theme_background_url
          nullable: true
          type: string
        theme_background_mode:
          title: IProfile.theme_background_mode
          nullable: true
          type: string
        theme_background_alpha:
          title: IProfile.theme_background_alpha
          nullable: true
          type: integer
      required:

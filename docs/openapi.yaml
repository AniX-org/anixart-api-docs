        - avatar
        - status
        - sponsorshipExpires
        - history
        - votes
        - last_activity_time
        - register_date
        - vk_page
        - tg_page
        - inst_page
        - tt_page
        - discord_page
        - ban_expires
        - ban_reason
        - ban_note
        - privilege_level
        - watching_count
        - plan_count
        - completed_count
        - hold_on_count
        - dropped_count
        - favorite_count
        - comment_count
        - collection_count
        - video_count
        - friend_count
        - watched_episode_count
        - watched_time
        - is_private
        - is_sponsor
        - is_banned
        - is_perm_banned
        - is_bookmarks_transferred
        - is_sponsor_transferred
        - is_vk_bound
        - is_google_bound
        - is_release_type_notifications_enabled
        - is_episode_notifications_enabled
        - is_first_episode_notification_enabled
        - is_related_release_notifications_enabled
        - is_report_process_notifications_enabled
        - is_comment_notifications_enabled
        - is_my_collection_comment_notifications_enabled
        - is_verified
        - watch_dynamics
        - friend_status
        - rating_score
        - is_blocked
        - is_me_blocked
        - is_stats_hidden
        - is_counts_hidden
        - is_social_hidden
        - is_friend_requests_disallowed
        - is_online
        - roles
        - badge
        - preferred_genres
        - preferred_audiences
        - preferred_themes
        - theme_enabled
        - theme_gradient_start_color
        - theme_gradient_end_color
        - theme_gradient_angle
        - theme_icon_res_name
        - theme_icon_url
        - theme_icon_color
        - theme_icon_alpha
        - theme_icon_destiny
        - theme_icon_size
        - theme_animation_enabled
        - theme_animation_speed
        - theme_background_url
        - theme_background_mode
        - theme_background_alpha
      additionalProperties: false
      title: IProfile
      type: object
    IRole:
      properties:
        color:
          title: IRole.color
          type: string
        name:
          title: IRole.name
          type: string
      required:
        - color
        - name
      additionalProperties: false
      title: IRole
      type: object
    IBadge:
